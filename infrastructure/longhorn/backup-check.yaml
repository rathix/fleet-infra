apiVersion: v1
kind: ServiceAccount
metadata:
  name: longhorn-backup-check
  namespace: longhorn-system
  labels:
    app.kubernetes.io/name: longhorn-backup-check
---
# Read-only access to Longhorn volumes + their backup records.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: longhorn-backup-check
  namespace: longhorn-system
  labels:
    app.kubernetes.io/name: longhorn-backup-check
rules:
  - apiGroups: ["longhorn.io"]
    resources: ["volumes", "backupvolumes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: longhorn-backup-check
  namespace: longhorn-system
  labels:
    app.kubernetes.io/name: longhorn-backup-check
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: longhorn-backup-check
subjects:
  - kind: ServiceAccount
    name: longhorn-backup-check
    namespace: longhorn-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: longhorn-backup-check
  namespace: longhorn-system
  labels:
    app.kubernetes.io/name: longhorn-backup-check
data:
  check.py: |
    #!/usr/bin/env python3
    # Verifies every Longhorn volume has a recent successful backup. Emails
    # (SMTP) when any volume is stale/missing, or when the Kubernetes API can't
    # be reached after retries. Failure-only: a healthy run is silent (exit 0).
    #
    # Reads the BackupVolume CRDs (longhorn.io/v1beta2) via the Kubernetes API
    # rather than the Longhorn REST API: the CRD's spec.volumeName /
    # status.lastBackupAt are stable across versions, whereas the REST API's
    # backupVolume `name` became a hashed "<volume>-<hash>" in Longhorn 1.6+.
    import os, sys, json, ssl, time, smtplib, urllib.request, urllib.error
    from datetime import datetime, timezone
    from email.message import EmailMessage

    HOST = "https://kubernetes.default.svc"
    SA = "/var/run/secrets/kubernetes.io/serviceaccount"
    NS = os.environ.get("LONGHORN_NAMESPACE", "longhorn-system")
    BASE = f"/apis/longhorn.io/v1beta2/namespaces/{NS}"
    # Daily backups run at 02:00; 50h tolerates one delayed/missed daily cycle
    # (backups serialize at concurrency 1) and pages only on a real stall.
    MAX_AGE_H = float(os.environ.get("MAX_AGE_HOURS", "50"))

    with open(f"{SA}/token") as f:
        TOKEN = f.read().strip()
    CTX = ssl.create_default_context(cafile=f"{SA}/ca.crt")

    def api_get(path):
        url = f"{HOST}{path}"
        for attempt in range(4):
            try:
                req = urllib.request.Request(
                    url, headers={"Authorization": f"Bearer {TOKEN}"})
                with urllib.request.urlopen(req, timeout=30, context=CTX) as r:
                    return json.load(r)
            except urllib.error.HTTPError as e:
                if e.code in (429, 500, 503) and attempt < 3:
                    ra = e.headers.get("Retry-After", "")
                    time.sleep(float(ra) if ra.isdigit() else (2, 5, 10)[attempt])
                    continue
                raise
            except urllib.error.URLError:
                if attempt < 3:
                    time.sleep((2, 5, 10)[attempt])
                    continue
                raise

    def parse_ts(s):
        try:
            return datetime.fromisoformat(s.replace("Z", "+00:00"))
        except (ValueError, AttributeError):
            return None

    def send_email(subject, body):
        host = os.environ["SMTP_HOST"]
        port = int(os.environ.get("SMTP_PORT", "587"))
        sec = os.environ.get("SMTP_SECURITY", "starttls").lower()
        user = os.environ.get("SMTP_USERNAME")
        pw = os.environ.get("SMTP_PASSWORD")
        msg = EmailMessage()
        msg["From"] = os.environ["SMTP_FROM"]
        msg["To"] = os.environ["SMTP_TO"]
        msg["Subject"] = subject
        msg.set_content(body)
        ctx = ssl.create_default_context()
        if sec == "ssl":
            s = smtplib.SMTP_SSL(host, port, timeout=30, context=ctx)
        else:
            s = smtplib.SMTP(host, port, timeout=30)
            if sec == "starttls":
                s.starttls(context=ctx)
        if user:
            s.login(user, pw)
        s.send_message(msg)
        s.quit()

    def main():
        now = datetime.now(timezone.utc)
        try:
            vols = [v["metadata"]["name"]
                    for v in api_get(f"{BASE}/volumes").get("items", [])]
            last = {}
            for bv in api_get(f"{BASE}/backupvolumes").get("items", []):
                name = bv.get("spec", {}).get("volumeName") \
                    or bv.get("metadata", {}).get("name")
                last[name] = bv.get("status", {}).get("lastBackupAt", "")
        except Exception as e:
            send_email(
                "⚠ Longhorn backup check FAILED to run",
                f"Could not query the Kubernetes API for Longhorn backups:\n\n"
                f"  {e}\n\nBackups are currently UNVERIFIED.",
            )
            print(f"API error: {e}")
            sys.exit(1)

        problems = []
        for v in sorted(vols):
            ts = parse_ts(last.get(v, ""))
            if ts is None:
                problems.append(f"{v}: no successful backup found in the backupstore")
                continue
            age = (now - ts).total_seconds() / 3600
            if age > MAX_AGE_H:
                problems.append(
                    f"{v}: last backup {age:.1f}h ago ({ts.isoformat()}) "
                    f"— exceeds {MAX_AGE_H:.0f}h threshold"
                )

        if problems:
            body = (
                "Longhorn reports stale or missing backups:\n\n"
                + "\n".join(f"  • {p}" for p in problems)
                + f"\n\nChecked {len(vols)} volume(s) at {now.isoformat()}.\n"
                "Investigate in the Longhorn UI → Backup, and confirm the NFS "
                "backup target is reachable.\n"
            )
            send_email(
                f"⚠ Longhorn backup alert: {len(problems)} volume(s) stale/missing",
                body,
            )
            print(body)
            sys.exit(1)

        print(f"OK: all {len(vols)} volume(s) have a backup within {MAX_AGE_H:.0f}h")

    main()
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: longhorn-backup-check
  namespace: longhorn-system
  labels:
    app.kubernetes.io/name: longhorn-backup-check
spec:
  # 06:00 — well after the 02:00 daily backup window.
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: longhorn-backup-check
        spec:
          restartPolicy: Never
          serviceAccountName: longhorn-backup-check
          automountServiceAccountToken: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: check
              image: python:3.14-alpine
              imagePullPolicy: IfNotPresent
              command: ["python3", "/app/check.py"]
              env:
                - name: HOME
                  value: /tmp
                - name: PYTHONDONTWRITEBYTECODE
                  value: "1"
              envFrom:
                - secretRef:
                    name: longhorn-backup-check-smtp
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: script
                  mountPath: /app
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  memory: 64Mi
                  cpu: "0.05"
                limits:
                  memory: 128Mi
                  cpu: "0.5"
          volumes:
            - name: script
              configMap:
                name: longhorn-backup-check
            - name: tmp
              emptyDir:
                medium: Memory
