# Backup/snapshot retention scheme (GFS — grandfather-father-son)
#
# Snapshots live on the same disks as the live volume (fast "undo", but NOT
# disaster-safe). Backups are copied off-volume to the NFS target and are the
# real recovery tier. All jobs target the `default` group, which every Longhorn
# volume joins automatically unless it carries an opt-out label.
#
#   Snapshots : every 8h, keep 6   -> 48h of on-volume restore points
#   Daily     : 02:00,    keep 7   -> ~1 week
#   Weekly    : Sun 03:00, keep 5  -> ~1 month
#   Monthly   : 1st 04:00, keep 12 -> ~1 year
#
# NB: snapshot retain (6) + transient backup snapshots must stay under each
# volume's snapshotMaxCount. defaultSettings.snapshotMaxCount in helmrelease.yaml
# (16) only seeds NEW volumes — existing volumes keep the per-volume
# spec.snapshotMaxCount they were created with, which can be lower and silently
# shadow the global default. When a volume's cap drops to/below the retain, the
# engine refuses new snapshots ("snapshot count usage N >= snapshotMaxCount N")
# and, because a backup snapshots first, backups stall too. backup-check.yaml
# flags low per-volume caps proactively (MIN_SNAPSHOT_MAX_COUNT).
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: snapshot-recurring
  namespace: longhorn-system
spec:
  task: snapshot
  cron: "0 */8 * * *"
  retain: 6
  concurrency: 1
  groups:
    - default
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: snapshot-cleanup-recurring
  namespace: longhorn-system
spec:
  task: snapshot-cleanup
  cron: "30 */8 * * *"
  retain: 6
  concurrency: 1
  groups:
    - default
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: backup-daily
  namespace: longhorn-system
spec:
  task: backup
  cron: "0 2 * * *"
  retain: 7
  concurrency: 1
  groups:
    - default
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: backup-weekly
  namespace: longhorn-system
spec:
  task: backup
  cron: "0 3 * * 0"
  retain: 5
  concurrency: 1
  groups:
    - default
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: backup-monthly
  namespace: longhorn-system
spec:
  task: backup
  cron: "0 4 1 * *"
  retain: 12
  concurrency: 1
  groups:
    - default
