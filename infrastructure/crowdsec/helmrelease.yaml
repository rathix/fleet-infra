apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crowdsec
  namespace: flux-system
spec:
  chart:
    spec:
      chart: crowdsec
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: crowdsec
      version: 0.22.1
  interval: 30m
  timeout: 10m
  targetNamespace: crowdsec
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  values:
    container_runtime: containerd
    lapi:
      replicas: 1
      extraConfig:
        config.yaml.local: |
          db_config:
            flush:
              agents_autodelete:
                login_password: 168h
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 256Mi
      env:
        - name: ENROLL_KEY
          valueFrom:
            secretKeyRef:
              name: crowdsec-enroll-key
              key: enroll-key
        - name: ENROLL_INSTANCE_NAME
          value: "fleet-infra-k8s"
        - name: ENROLL_TAGS
          value: "env:production cluster:fleet-infra"
      persistentVolume:
        config:
          enabled: true
          size: 1Gi
          storageClassName: longhorn
        data:
          enabled: true
          size: 2Gi
          storageClassName: longhorn
    agent:
      acquisition:
        - namespace: traefik-system
          podName: traefik-*
          program: traefik
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 256Mi
      env:
        - name: COLLECTIONS
          value: "crowdsecurity/traefik crowdsecurity/linux"
    appsec:
      enabled: true
      acquisitions:
        - source: appsec
          appsec_config: crowdsecurity/appsec-default
          listen_addr: 0.0.0.0:7422
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 256Mi
      env:
        - name: COLLECTIONS
          value: "crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules"
