---
# Bouncer API key consumed by the LAPI entrypoint to STATICALLY register the
# Traefik bouncer (via the BOUNCER_KEY_traefik env var in helmrelease.yaml).
# Static registration is required for the AppSec WAF: the AppSec engine
# (api.server.enable=false, pure acquisition node) only accepts API keys of
# already-registered bouncers — it does NOT honour LAPI auto_registration.
# This value MUST match infrastructure/traefik/sealedsecret-crowdsec.yaml
# (traefik-system/crowdsec-bouncer-key:api-key), which the Traefik plugin sends.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: crowdsec-bouncer-key
  namespace: crowdsec
spec:
  encryptedData:
    api-key: 
  template:
    metadata:
      name: crowdsec-bouncer-key
      namespace: crowdsec
