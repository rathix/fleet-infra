apiVersion: apps/v1
kind: Deployment
metadata:
  name: cs-unifi-bouncer
  namespace: crowdsec
  labels:
    app: unifi-bouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unifi-bouncer
  template:
    metadata:
      labels:
        app: unifi-bouncer
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cs-unifi-bouncer
          image: ghcr.io/teifun2/cs-unifi-bouncer:v1.3.1
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: CROWDSEC_BOUNCER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: crowdsec-unifi-bouncer-secrets
                  key: crowdsec-bouncer-api-key
            - name: CROWDSEC_URL
              value: "http://crowdsec-crowdsec-service.crowdsec.svc.cluster.local:8080/"
            - name: UNIFI_HOST
              value: "https://192.168.1.1"
            - name: UNIFI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: crowdsec-unifi-bouncer-secrets
                  key: unifi-api-key
            - name: UNIFI_SKIP_TLS_VERIFY
              value: "true"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
