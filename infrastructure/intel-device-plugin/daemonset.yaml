# Intel GPU device plugin (upstream v0.36.0 raw DaemonSet, no operator/NFD).
# Advertises gpu.intel.com/i915 as an allocatable resource on every node so
# pods (e.g. Jellyfin) can request the Intel UHD 630 iGPU for QSV/VA-API
# transcoding. All 3 nodes have the identical iGPU, so the plain DaemonSet is
# sufficient — no Node Feature Discovery needed.
# Source: https://github.com/intel/intel-device-plugins-for-kubernetes/blob/v0.36.0/deployments/gpu_plugin/base/intel-gpu-plugin.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: intel-gpu-plugin
  namespace: intel-device-plugin
  labels:
    app: intel-gpu-plugin
spec:
  selector:
    matchLabels:
      app: intel-gpu-plugin
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: intel-gpu-plugin
    spec:
      containers:
      - name: intel-gpu-plugin
        # -shared-dev-num: how many containers may share a single physical GPU.
        # 4 lets Jellyfin and (later) Immich share the one iGPU per node.
        args:
          - -shared-dev-num
          - "4"
        env:
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          - name: HOST_IP
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
        image: docker.io/intel/intel-gpu-plugin:0.36.0@sha256:2db679be62b52ac985169084ca711cab6e6c59fe543ab2ddee58163d6f8d29e0
        imagePullPolicy: IfNotPresent
        securityContext:
          # Upstream sets seLinuxOptions.type: container_device_plugin_t for
          # SELinux clusters using container-selinux. Talos doesn't ship that
          # policy type, and PodSecurity rejects a custom type below privileged,
          # so it's omitted here.
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            memory: "45Mi"
            cpu: 40m
          limits:
            memory: "90Mi"
            cpu: 100m
        volumeMounts:
        - name: devfs
          mountPath: /dev/dri
          readOnly: true
        - name: sysfsdrm
          mountPath: /sys/class/drm
          readOnly: true
        - name: kubeletsockets
          mountPath: /var/lib/kubelet/device-plugins
        - name: cdipath
          mountPath: /var/run/cdi
      volumes:
      - name: devfs
        hostPath:
          path: /dev/dri
      - name: sysfsdrm
        hostPath:
          path: /sys/class/drm
      - name: kubeletsockets
        hostPath:
          path: /var/lib/kubelet/device-plugins
      - name: cdipath
        hostPath:
          path: /var/run/cdi
          type: DirectoryOrCreate
      nodeSelector:
        kubernetes.io/arch: amd64
