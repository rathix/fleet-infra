apiVersion: v1
kind: Namespace
metadata:
  name: intel-device-plugin
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
  labels:
    app.kubernetes.io/name: intel-device-plugin
    # privileged: the plugin mounts hostPath volumes (/dev/dri, /sys/class/drm,
    # the kubelet device-plugin socket). hostPath is forbidden by BOTH the
    # restricted and baseline profiles, so privileged is required. The pod
    # itself is still locked down: no privileged container, drops ALL caps,
    # RuntimeDefault seccomp, read-only root fs.
    pod-security.kubernetes.io/enforce: privileged
