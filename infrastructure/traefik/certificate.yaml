apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: traefik-cert
  namespace: traefik-system
  labels:
    app.kubernetes.io/name: traefik
spec:
  commonName: "*.${domain}"
  dnsNames:
    - ${domain}
    - "*.${domain}"
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  secretName: traefik-cert
