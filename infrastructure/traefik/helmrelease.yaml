apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  chart:
    spec:
      chart: traefik
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: traefik
      version: 41.0.1
  interval: 30m
  timeout: 10m
  targetNamespace: traefik-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  values:
    deployment:
      kind: DaemonSet
    ingressClass:
      isDefaultClass: true
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
    securityContext:
      readOnlyRootFilesystem: true
      capabilities:
        drop: [ALL]
    ports:
      web:
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      # Raw-TCP entrypoint for MQTT so LAN smart-home devices can reach the
      # Mosquitto broker on the VIP (192.168.1.3:1883). This is plaintext and
      # is LAN-only ONLY because the router forwards just 80/443 to the VIP —
      # 1883 is never reachable from the internet. SECURITY INVARIANT: never
      # add a 1883 port-forward or DMZ the VIP, and keep Mosquitto auth on
      # (allow_anonymous false). No HTTP middlewares apply to a TCP entrypoint,
      # so the WAF/rate-limit chain is bypassed (correct for MQTT). Routed by
      # an IngressRouteTCP in the home-assistant namespace.
      mqtt:
        port: 1883
        exposedPort: 1883
        protocol: TCP
        expose:
          default: true
      websecure:
        http3:
          enabled: true
        # Traefik v3 defaults readTimeout to 60s (was unlimited in v2), which
        # severs long-running uploads such as Immich video uploads mid-request.
        # Raise it so large request bodies have time to stream through.
        transport:
          respondingTimeouts:
            readTimeout: "600s"
        forwardedHeaders:
          insecure: false
          trustedIPs:
            - 192.168.1.0/24
        http:
          middlewares:
            - traefik-system-crowdsec@kubernetescrd
            - traefik-system-security-headers@kubernetescrd
            - traefik-system-rate-limit@kubernetescrd
    log:
      format: json
    accessLog:
      enabled: true
      format: json
      fields:
        headers:
          defaultMode: drop
    ingressRoute:
      dashboard:
        enabled: true
        matchRule: Host(`traefik.${domain}`)
        entryPoints:
          - websecure
        middlewares:
          - name: oidc
          - name: lan-only
    service:
      spec:
        externalIPs: ["192.168.1.3"]
        externalTrafficPolicy: Local
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      # The yaegi-interpreted plugins (oidc, crowdsec) are memory-heavy and the
      # OIDC forward-auth plugin buffers request bodies. A 256Mi limit OOMKilled
      # (exit 137) the replica mid-upload on large/batched scans (e.g. paperless,
      # Immich): the upload connection reset ("HTTP error 0", no access-log line)
      # and every other app on that replica (jellyfin) dropped with it. 1Gi gives
      # headroom for concurrent buffered upload bodies.
      limits:
        cpu: "1"
        memory: 1Gi
    tlsOptions:
      default:
        minVersion: VersionTLS13
        sniStrict: false
    tlsStore:
      default:
        defaultCertificate:
          secretName: traefik-cert
    experimental:
      plugins:
        traefik-oidc-auth:
          moduleName: "github.com/sevensolutions/traefik-oidc-auth"
          version: "v0.20.1"
        crowdsec-bouncer-traefik-plugin:
          moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
          version: "v1.6.0"
