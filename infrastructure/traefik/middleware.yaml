apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: traefik-system
  labels:
    app.kubernetes.io/name: traefik
spec:
  headers:
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    customFrameOptionsValue: "SAMEORIGIN"
    contentTypeNosniff: true
    referrerPolicy: strict-origin-when-cross-origin
    customResponseHeaders:
      X-Robots-Tag: noindex,nofollow,nosnippet,noarchive,notranslate,noimageindex
      X-XSS-Protection: "0"
      Permissions-Policy: "camera=(), microphone=(), geolocation=(), payment=()"
      Server: ""
      X-Powered-By: ""
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: traefik-system
  labels:
    app.kubernetes.io/name: traefik
spec:
  rateLimit:
    average: 300
    burst: 500
    period: 1m
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oidc
  namespace: traefik-system
  labels:
    app.kubernetes.io/name: traefik
spec:
  plugin:
    traefik-oidc-auth:
      Secret: urn:k8s:secret:oidc-secret:pluginSecret
      Provider:
        Url: http://pocket-id.pocket-id.svc.cluster.local:1411
        ValidIssuer: https://auth.kennyandries.com
        ClientId: urn:k8s:secret:oidc-secret:providerClientId
        ClientSecret: urn:k8s:secret:oidc-secret:providerClientSecret
      # pocket-id only advertises openid/profile/email/groups in
      # scopes_supported. v2.9.0 strictly validates scopes and hard-rejects
      # any unknown scope with invalid_scope, aborting the authorize flow
      # (no code issued -> plugin reports "Code is missing"). offline_access
      # was never supported by pocket-id (silently ignored pre-2.9), so it
      # granted nothing — token/session lifetime is managed in pocket-id.
      Scopes: ["openid", "profile", "email"]
      Headers:
        - Name: "Remote-User"
          Value: "{{ .claims.preferred_username }}"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: lan-only
  namespace: traefik-system
  labels:
    app.kubernetes.io/name: traefik
spec:
  ipAllowList:
    sourceRange:
      - 192.168.1.0/24
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: crowdsec
  namespace: traefik-system
  labels:
    app.kubernetes.io/name: traefik
spec:
  plugin:
    crowdsec-bouncer-traefik-plugin:
      # REQUIRED: the plugin defaults Enabled=false. Without this, ServeHTTP
      # short-circuits (`if !bouncer.enabled { next; return }`) and bypasses
      # BOTH IP-reputation bouncing AND the AppSec WAF for every request —
      # while the decision-stream ticker still runs in the background, so the
      # bouncer falsely appears healthy. This single missing field silently
      # disabled the entire WAF.
      enabled: true
      crowdsecLapiScheme: http
      crowdsecLapiHost: crowdsec-crowdsec-service.crowdsec.svc.cluster.local:8080
      crowdsecLapiKey: urn:k8s:secret:crowdsec-bouncer-key:api-key
      crowdsecMode: stream
      updateIntervalSeconds: 15
      crowdsecAppsecEnabled: true
      crowdsecAppsecHost: crowdsec-crowdsec-appsec-service.crowdsec.svc.cluster.local:7422
      crowdsecAppsecFailureBlock: true
      crowdsecAppsecUnreachableBlock: true
