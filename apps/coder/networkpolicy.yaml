apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-ingress
  namespace: coder
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # External entry via Traefik
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik-system
    # Intra-namespace (coderd <-> postgres, coderd <-> workspace pods)
    - from:
        - podSelector: {}
