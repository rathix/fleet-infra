apiVersion: apps/v1
kind: Deployment
metadata:
  name: coder-postgres
  namespace: coder
  labels:
    app.kubernetes.io/name: coder-postgres
    app.kubernetes.io/part-of: coder
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: coder-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coder-postgres
        app.kubernetes.io/part-of: coder
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 70
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: coder
            - name: POSTGRES_DB
              value: coder
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coder-db
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "coder", "-d", "coder"]
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "coder", "-d", "coder"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: 128Mi
              cpu: "50m"
            limits:
              memory: 1Gi
              cpu: "1"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: coder-postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: coder-postgres
  namespace: coder
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
  labels:
    app.kubernetes.io/name: coder-postgres
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: coder-postgres
  namespace: coder
  labels:
    app.kubernetes.io/name: coder-postgres
    app.kubernetes.io/part-of: coder
spec:
  selector:
    app.kubernetes.io/name: coder-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
