apiVersion: v1
kind: PersistentVolume
metadata:
  name: servarr-jellyfin-media-nfs
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
  labels:
    app.kubernetes.io/name: servarr
spec:
  capacity:
    storage: 2000Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.1.21
    path: /mnt/hpool/media
