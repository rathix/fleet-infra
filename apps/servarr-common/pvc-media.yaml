apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: servarr-jellyfin-media
  namespace: servarr
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
  labels:
    app.kubernetes.io/name: servarr
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: servarr-jellyfin-media-nfs
  resources:
    requests:
      storage: 2000Gi
