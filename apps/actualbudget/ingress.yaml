apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: actualbudget
  namespace: actualbudget
  labels:
    app.kubernetes.io/name: actualbudget
  # No Traefik forward-auth middleware: ActualBudget authenticates via its own
  # built-in OpenID Connect (against pocket-id). A forward-auth proxy here would
  # intercept the sync/API calls and break the local-first PWA ("Server offline").
spec:
  ingressClassName: ${ingress_class}
  rules:
    - host: actualbudget.${domain}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: actualbudget
                port:
                  name: http
