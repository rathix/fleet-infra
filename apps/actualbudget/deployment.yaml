apiVersion: apps/v1
kind: Deployment
metadata:
  name: actualbudget
  namespace: actualbudget
  labels:
    app.kubernetes.io/name: actualbudget
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: actualbudget
  template:
    metadata:
      labels:
        app.kubernetes.io/name: actualbudget
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: actualbudget
          image: actualbudget/actual-server:26.6.0
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            capabilities:
              drop:
                - ALL
          env:
            - name: ACTUAL_PORT
              value: "5006"
            - name: ACTUAL_DATA_DIR
              value: /data
            - name: ACTUAL_SERVER_FILES
              value: /data/server-files
            - name: ACTUAL_USER_FILES
              value: /data/user-files
          ports:
            - name: http
              containerPort: 5006
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
            requests:
              memory: 128Mi
              cpu: "50m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: actualbudget-actualbudget-data
