apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: copy-config
          image: busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          command: ["sh", "-c", "cp /configmap/* /config/"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: homepage-config
              mountPath: /configmap
            - name: config
              mountPath: /config
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v1.13.2@sha256:a0b71c8e757298d02560186bab9fbe3fc2d375c523a62cc1019177b37e48aa28
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: homepage.kennyandries.com
            - name: HOMEPAGE_VAR_SONARR
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: sonarrKey
            - name: HOMEPAGE_VAR_RADARR
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: radarrKey
            - name: HOMEPAGE_VAR_LIDARR
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: lidarrKey
            - name: HOMEPAGE_VAR_PROWLARR
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: prowlarrKey
            - name: HOMEPAGE_VAR_JELLYFIN
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: jellyfinKey
            - name: HOMEPAGE_VAR_SABNZBD
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: sabnzbdKey
            - name: HOMEPAGE_VAR_JELLYSEERR
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: jellyseerrKey
            - name: HOMEPAGE_VAR_CROWDSEC_USER
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: crowdsecUser
            - name: HOMEPAGE_VAR_CROWDSEC_PASS
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: crowdsecPass
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: logs
              mountPath: /app/config/logs
            - name: tmp
              mountPath: /tmp
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
            requests:
              memory: 256Mi
              cpu: "0.2"
      volumes:
        - name: homepage-config
          configMap:
            name: homepage
        - name: config
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir:
            medium: Memory
