apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    providers:
      longhorn:
        url: http://longhorn-frontend.longhorn-system.svc.cluster.local:80
    theme: dark
    color: teal
    headerStyle: boxed
    useEqualHeights: true
    statusStyle: dot
    # Background loads client-side in the browser (no pod egress needed).
    # Kept dark/low-brightness so colourful service logos stay readable.
    background:
      image: https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?auto=format&fit=crop&w=2560&q=80
      blur: sm
      saturate: 60
      brightness: 35
      opacity: 50
    cardBlur: md
    # Groups are organised into tabs. A group with no tab shows on every tab,
    # so all groups (including bookmarks) are assigned to keep tabs clean.
    layout:
      Media:
        tab: Media
        style: row
        columns: 4
      Upcoming:
        tab: Media
      Services:
        tab: Apps
        style: row
        columns: 4
      Cluster Management:
        tab: Infrastructure
        style: row
        columns: 4
      TrueNAS:
        tab: Infrastructure
        style: row
        columns: 4
      Networking:
        tab: Infrastructure
        style: row
        columns: 4
      Monitoring:
        tab: Monitoring
        style: row
        columns: 4
      Development:
        tab: Links
      Hetzner:
        tab: Links
      Personal:
        tab: Links
      Work:
        tab: Links
      Shopping:
        tab: Links
      Homelab:
        tab: Links
  bookmarks.yaml: |
    - Development:
        - Github:
            - abbr: GH
              href: https://github.com/
    - Hetzner:
        - konsoleH:
            - abbr: KH
              href: https://konsoleh.hetzner.com/
        - DNS Console:
            - abbr: DC
              href: https://dns.hetzner.com/
        - KH Webmail:
            - abbr: KW
              href: https://webmail.your-server.de/
        - Cloud Console:
            - abbr: CC
              href: https://console.hetzner.com/
    - Personal:
        - Personal Website:
            - abbr: KA
              href: https://kennyandries.com/
        - ProtonMail:
            - abbr: PM
              href: https://mail.proton.me/u/4/inbox
    - Work:
        - Company Website:
            - abbr: RC
              href: https://rathix.be/
        - Liantis:
            - abbr: LI
              href: https://app.liantis.be/myliantis/
    - Shopping:
        - Albert Heijn:
            - abbr: AH
              href: https://ah.be/
        - Collect&Go:
            - abbr: CG
              href: https://collectandgo.be/colruyt/nl/home
    - Homelab:
        - Cloudflare:
            - abbr: CF
              href: https://dash.cloudflare.com
        - CrowdSec:
            - abbr: CS
              href: https://app.crowdsec.net
  services.yaml: |
    - Media:
        - Jellyfin:
            icon: jellyfin.png
            href: https://jellyfin.kennyandries.com/
            description: Media server
            namespace: servarr
            app: jellyfin
            siteMonitor: http://jellyfin.servarr.svc.cluster.local:8096
            widget:
              type: jellyfin
              url: http://jellyfin.servarr.svc.cluster.local:8096
              key: {{HOMEPAGE_VAR_JELLYFIN}}
              version: 2
              enableBlocks: true
              enableNowPlaying: true
              enableUser: true
              enableMediaControl: false
              showEpisodeNumber: true
              expandOneStreamToTwoRows: false
        - Audiobookshelf:
            icon: audiobookshelf.png
            href: https://audiobookshelf.kennyandries.com/
            description: Audiobook & podcast server
            namespace: servarr
            app: audiobookshelf
            siteMonitor: http://audiobookshelf.servarr.svc.cluster.local:13378
            # Widget needs an API token (Settings > Users > token). Add once
            # the app is running and HOMEPAGE_VAR_AUDIOBOOKSHELF is sealed:
            # widget:
            #   type: audiobookshelf
            #   url: http://audiobookshelf.servarr.svc.cluster.local:13378
            #   key: {{HOMEPAGE_VAR_AUDIOBOOKSHELF}}
        - Radarr:
            icon: radarr.png
            href: https://radarr.kennyandries.com/
            description: Movie manager
            namespace: servarr
            app: radarr
            siteMonitor: http://radarr.servarr.svc.cluster.local:7878
            widget:
              type: radarr
              url: http://radarr.servarr.svc.cluster.local:7878
              key: {{HOMEPAGE_VAR_RADARR}}
              enableQueue: true
        - Sonarr:
            icon: sonarr.png
            href: https://sonarr.kennyandries.com/
            description: Series manager
            namespace: servarr
            app: sonarr
            siteMonitor: http://sonarr.servarr.svc.cluster.local:8989
            widget:
              type: sonarr
              url: http://sonarr.servarr.svc.cluster.local:8989
              key: {{HOMEPAGE_VAR_SONARR}}
              enableQueue: true
        - Lidarr:
            icon: lidarr.png
            href: https://lidarr.kennyandries.com/
            description: Music manager
            namespace: servarr
            app: lidarr
            siteMonitor: http://lidarr.servarr.svc.cluster.local:8686
            widget:
              type: lidarr
              url: http://lidarr.servarr.svc.cluster.local:8686
              key: {{HOMEPAGE_VAR_LIDARR}}
              enableQueue: true
        - Prowlarr:
            icon: prowlarr.png
            href: https://prowlarr.kennyandries.com/
            description: Indexer manager
            namespace: servarr
            app: prowlarr
            siteMonitor: http://prowlarr.servarr.svc.cluster.local:9696
            widget:
              type: prowlarr
              url: http://prowlarr.servarr.svc.cluster.local:9696
              key: {{HOMEPAGE_VAR_PROWLARR}}
        - Seerr:
            icon: jellyseerr.png
            href: https://seerr.kennyandries.com/
            description: Request manager
            namespace: servarr
            app: seerr
            siteMonitor: http://seerr.servarr.svc.cluster.local:5055
            widget:
              type: jellyseerr
              url: http://seerr.servarr.svc.cluster.local:5055
              key: {{HOMEPAGE_VAR_JELLYSEERR}}
        - qBittorrent:
            icon: qbittorrent.png
            href: https://qbittorrent.kennyandries.com/
            description: Download client
            namespace: servarr
            app: qbittorrent
            siteMonitor: http://qbittorrent.servarr.svc.cluster.local:8080
            widget:
              type: qbittorrent
              url: http://qbittorrent.servarr.svc.cluster.local:8080
              enableLeechProgress: true
              enableLeechSize: true
        - SABnzbd:
            icon: sabnzbd.png
            href: https://sabnzbd.kennyandries.com/
            description: Download client
            namespace: servarr
            app: sabnzbd
            siteMonitor: http://servarr-sabnzbd.servarr.svc.cluster.local:8080
            widget:
              type: sabnzbd
              url: http://servarr-sabnzbd.servarr.svc.cluster.local:8080
              key: {{HOMEPAGE_VAR_SABNZBD}}
        - Immich:
            icon: immich.png
            href: https://immich.kennyandries.com/
            description: Photo manager
            namespace: immich
            app: immich-server
            siteMonitor: http://immich-server.immich.svc.cluster.local:2283
    - Upcoming:
        - Calendar:
            widget:
              type: calendar
              view: agenda
              maxEvents: 12
              showTime: true
              firstDayInWeek: monday
              timezone: Europe/Brussels
              # Integrations reuse the existing widget creds of these services
              integrations:
                - type: sonarr
                  service_group: Media
                  service_name: Sonarr
                  color: teal
                - type: radarr
                  service_group: Media
                  service_name: Radarr
                  color: red
                - type: lidarr
                  service_group: Media
                  service_name: Lidarr
                  color: purple
    - Services:
        - Actual Budget:
            icon: actual-budget.png
            href: https://actualbudget.kennyandries.com/
            description: Budget manager
            namespace: actualbudget
            app: actualbudget
            siteMonitor: http://actualbudget.actualbudget.svc.cluster.local:5006
        - Paperless:
            icon: paperless-ngx.png
            href: https://paperless.kennyandries.com/
            description: Document manager
            namespace: paperless
            app: paperless
            siteMonitor: http://paperless.paperless.svc.cluster.local:8000
        - Trilium:
            icon: trilium.png
            href: https://trilium.kennyandries.com/
            description: Notes
            namespace: trilium
            app: trilium
            siteMonitor: http://trilium.trilium.svc.cluster.local:8080
        - Pocket ID:
            icon: pocket-id.png
            href: https://auth.kennyandries.com/
            description: Identity provider
            namespace: pocket-id
            app: pocket-id
            siteMonitor: https://auth.kennyandries.com/
        - code-server:
            icon: code-server.png
            href: https://code.kennyandries.com/
            description: Cloud IDE
            namespace: code-server
            app: code-server
            siteMonitor: http://code-server.code-server.svc.cluster.local:8080
        - Vaultwarden:
            icon: vaultwarden.png
            href: https://vaultwarden.kennyandries.com/
            description: Password manager
            namespace: vaultwarden
            app: vaultwarden
            siteMonitor: http://vaultwarden.vaultwarden.svc.cluster.local:8080
        - Home Assistant:
            icon: home-assistant.png
            href: http://homeassistant.local:8123/
            description: Smart home controller
            siteMonitor: http://192.168.1.151:8123/
    - Cluster Management:
        - Traefik:
            icon: traefik.png
            href: https://traefik.kennyandries.com/
            description: Reverse proxy
            namespace: traefik-system
            app: traefik
            siteMonitor: https://traefik.kennyandries.com
        - Longhorn:
            icon: longhorn.png
            href: https://longhorn.kennyandries.com/
            description: Block storage
            namespace: longhorn-system
            app: longhorn
            siteMonitor: http://longhorn-frontend.longhorn-system.svc.cluster.local:80
        - CrowdSec:
            icon: crowdsec.png
            href: https://app.crowdsec.net
            description: WAF / IPS
            siteMonitor: http://crowdsec-crowdsec-service.crowdsec.svc.cluster.local:8080/health
            widget:
              type: crowdsec
              url: http://crowdsec-crowdsec-service.crowdsec.svc.cluster.local:8080
              username: {{HOMEPAGE_VAR_CROWDSEC_USER}}
              password: {{HOMEPAGE_VAR_CROWDSEC_PASS}}
    - TrueNAS:
        - pkb-nas-tns-1:
            icon: truenas.png
            href: https://pkb-nas-tns-1/
            description: File server
            siteMonitor: https://192.168.1.21
        - plb-nas-tns-1:
            icon: truenas.png
            href: https://192.168.2.2/
            description: File server
            siteMonitor: https://192.168.2.2
    - Networking:
        - UniFi Express 7:
            icon: unifi.png
            href: https://192.168.1.1/
            description: Network gateway
            siteMonitor: https://192.168.1.1
    - Monitoring:
        - Uptime Kuma:
            icon: uptime-kuma.png
            href: https://uptime-kuma.kennyandries.com/
            description: Uptime monitor
            namespace: uptime-kuma
            app: uptime-kuma
            siteMonitor: https://uptime-kuma.kennyandries.com/
        - Beszel:
            icon: beszel.png
            href: https://beszel.kennyandries.com/
            description: System monitor
            namespace: beszel
            app: beszel
            siteMonitor: https://beszel.kennyandries.com/
            widget:
              type: beszel
              url: http://beszel.beszel.svc.cluster.local:8090
              username: {{HOMEPAGE_VAR_BESZEL_USER}}
              password: {{HOMEPAGE_VAR_BESZEL_PASS}}
              version: 2
  widgets.yaml: |
    - greeting:
        text_size: xl
        text: Welcome back, Kenny
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hourCycle: h23
    # No API key required. Ghent, Belgium.
    - openmeteo:
        label: Ghent
        latitude: 51.0543
        longitude: 3.7174
        timezone: Europe/Brussels
        units: metric
        cache: 5
    # Cluster summary only — per-node detail lives in the Beszel tile
    # (Monitoring tab), so the header stays compact.
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: false
    # Aggregate storage only (no per-node sprawl)
    - longhorn:
        expanded: false
        total: true
        labels: false
        nodes: false
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
  proxmox.yaml: ""
