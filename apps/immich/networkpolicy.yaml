apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-ingress
  namespace: immich
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # External entry via Traefik
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik-system
    # Intra-namespace pod-to-pod (server <-> postgres/redis/ml)
    - from:
        - podSelector: {}
