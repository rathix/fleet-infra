apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma
  namespace: flux-system
spec:
  chart:
    spec:
      chart: uptime-kuma
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: uptime-kuma
      version: 4.1.0
  interval: 30m
  timeout: 5m
  targetNamespace: uptime-kuma
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  values:
    ingress:
      enabled: true
      annotations:
        traefik.ingress.kubernetes.io/router.middlewares: traefik-system-oidc@kubernetescrd
      hosts:
        - host: uptime-kuma.kennyandries.com
          paths:
            - path: /
              pathType: ImplementationSpecific
    podSecurityContext:
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      capabilities:
        drop:
          - ALL
    volume:
      enabled: true
      existingClaim: uptime-kuma-uptime-kuma-pvc
    strategy:
      type: Recreate
    resources:
      limits:
        cpu: 500m
    image:
      repository: louislam/uptime-kuma
      tag: 2.4.0@sha256:91e963bfda569ba115206e843febb446f473ab525add4e08b2b9e3beffa16985
    extraVolumes:
      - name: tmp
        emptyDir:
          medium: Memory
    extraVolumeMounts:
      - name: tmp
        mountPath: /tmp
