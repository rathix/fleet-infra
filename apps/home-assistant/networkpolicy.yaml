apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mosquitto
  namespace: home-assistant
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mosquitto
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homeassistant
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: zigbee2mqtt
        # LAN MQTT devices (Tasmota/Shelly/ESPHome) reach the broker via the
        # Traefik TCP entrypoint on the VIP; the proxied connection originates
        # from the Traefik pod.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik-system
      ports:
        - protocol: TCP
          port: 1883
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zigbee2mqtt
  namespace: home-assistant
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: zigbee2mqtt
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik-system
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mosquitto
      ports:
        - protocol: TCP
          port: 1883
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: homeassistant
  namespace: home-assistant
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: homeassistant
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik-system
        # speech-to-phrase connects to the HA websocket API to learn the
        # entities exposed to Assist (it trains a fixed-phrase model from them).
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: speech-to-phrase
      ports:
        - protocol: TCP
          port: 8123
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # MQTT broker
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mosquitto
      ports:
        - protocol: TCP
          port: 1883
    # LAN devices + internet integrations (HA needs broad egress)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: speech-to-phrase
  namespace: home-assistant
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: speech-to-phrase
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # HA streams audio to the Wyoming STT service.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homeassistant
      ports:
        - protocol: TCP
          port: 10300
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HA websocket API (entity discovery for training)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homeassistant
      ports:
        - protocol: TCP
          port: 8123
    # Model + tool downloads from HuggingFace / GitHub on first run
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
---
