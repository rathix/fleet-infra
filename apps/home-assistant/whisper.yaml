apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whisper-data
  namespace: home-assistant
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
  labels:
    app.kubernetes.io/name: whisper
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ${storage_class}
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisper
  namespace: home-assistant
  labels:
    app.kubernetes.io/name: whisper
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: whisper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: whisper
    spec:
      enableServiceLinks: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: whisper
          image: docker.io/rhasspy/wyoming-whisper:3.4.1@sha256:9f35594df729b2c1d3fa9a69d1faf4432082ed6dab2ba87da1d5a58f4e4e8f52
          securityContext:
            # Pure Python STT on a high port: needs no Linux capabilities and no
            # privilege escalation. Stays root (the rhasspy image writes model
            # downloads + /tmp at runtime and isn't built for non-root).
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          # The image entrypoint (docker_run.sh) already supplies
          # --uri tcp://0.0.0.0:10300 --data-dir /data and forwards "$@".
          # Whisper is a pure STT service (no HA callback, unlike
          # speech-to-phrase), so no shell wrapper or token is needed.
          # small-int8 is the best accuracy/latency balance on this CPU-only
          # cluster.
          args:
            - --model
            - small-int8
            - --language
            - en
          ports:
            - name: wyoming
              containerPort: 10300
          # Wyoming is a raw TCP protocol (not HTTP), so probes are tcpSocket.
          # The startup probe allows time for the model to download from
          # HuggingFace on first boot before :10300 listens.
          startupProbe:
            tcpSocket:
              port: wyoming
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: wyoming
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: wyoming
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            limits:
              memory: 2Gi
              cpu: "4"
            requests:
              memory: 256Mi
              cpu: "200m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: whisper-data
---
apiVersion: v1
kind: Service
metadata:
  name: whisper
  namespace: home-assistant
  labels:
    app.kubernetes.io/name: whisper
spec:
  selector:
    app.kubernetes.io/name: whisper
  ports:
    - name: wyoming
      port: 10300
      targetPort: wyoming
