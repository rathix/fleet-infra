apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: mosquitto-mqtt
  namespace: home-assistant
  labels:
    app.kubernetes.io/name: mosquitto
spec:
  # Raw TCP passthrough on the dedicated `mqtt` entrypoint (192.168.1.3:1883).
  # HostSNI(`*`) is the catch-all match permitted only for non-TLS routes —
  # MQTT here is plaintext, so there is no TLS section.
  entryPoints:
    - mqtt
  routes:
    - match: HostSNI(`*`)
      services:
        - name: mosquitto
          port: 1883
