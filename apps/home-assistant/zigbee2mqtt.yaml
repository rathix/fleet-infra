apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zigbee2mqtt-data
  namespace: home-assistant
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
  labels:
    app.kubernetes.io/name: zigbee2mqtt
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ${storage_class}
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zigbee2mqtt
  namespace: home-assistant
  labels:
    app.kubernetes.io/name: zigbee2mqtt
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: zigbee2mqtt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zigbee2mqtt
    spec:
      enableServiceLinks: false
      # Pinned to the node with the Sonoff dongle physically attached.
      nodeName: pkb-k3s-tal-1
      containers:
        - name: zigbee2mqtt
          image: docker.io/koenkk/zigbee2mqtt:2.12.0@sha256:1debff565ab6841417bd9f7ce8ad44f8c5f25a8b02a24ce3fd79e4779a4763a5
          securityContext:
            # Raw serial device access requires privileged on Talos.
            privileged: true
          env:
            - name: TZ
              value: Europe/Brussels
            - name: ZIGBEE2MQTT_DATA
              value: /app/data
            - name: ZIGBEE2MQTT_CONFIG_SERIAL_PORT
              value: /dev/ttyUSB0
            - name: ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER
              value: zstack
            - name: ZIGBEE2MQTT_CONFIG_MQTT_SERVER
              value: mqtt://mosquitto:1883
            - name: ZIGBEE2MQTT_CONFIG_MQTT_BASE_TOPIC
              value: zigbee2mqtt
            - name: ZIGBEE2MQTT_CONFIG_MQTT_USER
              valueFrom:
                secretKeyRef:
                  name: mqtt-credentials
                  key: username
            - name: ZIGBEE2MQTT_CONFIG_MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mqtt-credentials
                  key: password
            - name: ZIGBEE2MQTT_CONFIG_FRONTEND_ENABLED
              value: "true"
            - name: ZIGBEE2MQTT_CONFIG_FRONTEND_PORT
              value: "8080"
            - name: ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED
              value: "true"
            - name: ZIGBEE2MQTT_CONFIG_PERMIT_JOIN
              value: "false"
            - name: ZIGBEE2MQTT_CONFIG_ADVANCED_LOG_LEVEL
              value: info
          ports:
            - name: http
              containerPort: 8080
          # TCP probes, not httpGet: z2m 2.x serves an interactive onboarding
          # page on :8080 with `Connection: close`, which makes httpGet probes
          # flap (EOF/timeout) and kill the pod before onboarding can be
          # completed. A TCP check passes as soon as the frontend listens
          # (onboarding or normal), so the pod stays Ready and reachable.
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: ttyusb
              mountPath: /dev/ttyUSB0
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
            requests:
              memory: 128Mi
              cpu: "50m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: zigbee2mqtt-data
        - name: ttyusb
          hostPath:
            path: /dev/ttyUSB0
            type: CharDevice
---
apiVersion: v1
kind: Service
metadata:
  name: zigbee2mqtt
  namespace: home-assistant
  labels:
    app.kubernetes.io/name: zigbee2mqtt
spec:
  selector:
    app.kubernetes.io/name: zigbee2mqtt
  ports:
    - name: http
      port: 8080
      targetPort: http
