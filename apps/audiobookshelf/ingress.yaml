apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: audiobookshelf
  namespace: servarr
  labels:
    app.kubernetes.io/name: audiobookshelf
  # security-headers, rate-limit and crowdsec are applied globally on the
  # websecure entrypoint (see infrastructure/traefik/helmrelease.yaml), so no
  # per-ingress middleware annotation is needed. Audiobookshelf is intentionally
  # not OIDC-gated (native clients use built-in accounts).
spec:
  ingressClassName: ${ingress_class}
  rules:
    - host: audiobookshelf.${domain}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: audiobookshelf
                port:
                  number: 13378
