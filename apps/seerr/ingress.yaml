apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seerr
  namespace: servarr
  labels:
    app.kubernetes.io/name: seerr
spec:
  ingressClassName: ${ingress_class}
  rules:
    - host: seerr.${domain}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seerr
                port:
                  number: 5055
