apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jellyfin
  namespace: servarr
  labels:
    app.kubernetes.io/name: jellyfin
  # security-headers, rate-limit and crowdsec are applied globally on the
  # websecure entrypoint (see infrastructure/traefik/helmrelease.yaml), so no
  # per-ingress middleware annotation is needed. Jellyfin is intentionally not
  # OIDC-gated (native clients use built-in accounts).
spec:
  ingressClassName: ${ingress_class}
  rules:
    - host: jellyfin.${domain}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jellyfin
                port:
                  number: 8096
