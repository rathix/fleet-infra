apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trilium-pvc
  namespace: trilium
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
  labels:
    app.kubernetes.io/name: trilium
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 4Gi
