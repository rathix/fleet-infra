apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trilium
  namespace: flux-system
spec:
  chart:
    spec:
      chart: trilium
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: triliumnext
      version: 1.3.0
  interval: 30m
  timeout: 5m
  targetNamespace: trilium
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
    controllers:
      main:
        pod:
          enableServiceLinks: false
        containers:
          trilium:
            image:
              repository: triliumnext/notes
              tag: v0.95.0
              pullPolicy: IfNotPresent
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              capabilities:
                drop:
                  - ALL
    configini:
      general:
        instanceName: ""
        noAuthentication: false
        noBackup: false
      network:
        host: "0.0.0.0"
        port: 8080
        https: false
        certPath: ""
        keyPath: ""
        trustedReverseProxy: true
    ingress:
      main:
        enabled: true
        className: traefik-system-traefik
        annotations:
          traefik.ingress.kubernetes.io/router.middlewares: traefik-system-oidc@kubernetescrd
          external-dns.alpha.kubernetes.io/target: traefik.kennyandries.com
        hosts:
          - host: trilium.kennyandries.com
            paths:
              - path: /
                service:
                  identifier: main
                  port: http
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: trilium-pvc
        dataPermissionsInit:
          enabled: false
      tmp:
        enabled: true
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp
