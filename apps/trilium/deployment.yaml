apiVersion: apps/v1
kind: Deployment
metadata:
  name: trilium
  namespace: trilium
  labels:
    app.kubernetes.io/name: trilium
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: trilium
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trilium
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: copy-config
          image: busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          command:
            [
              "sh",
              "-c",
              "cp /configmap/config.ini /home/node/trilium-data/config.ini",
            ]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: configmap
              mountPath: /configmap
            - name: data
              mountPath: /home/node/trilium-data
      containers:
        - name: trilium
          image: triliumnext/trilium:v0.104.0@sha256:8e053aa58a90c1690106a324a4692690ba0491c21ae40485b4051e2911df9489
          command: ["node", "/usr/src/app/main.cjs"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
          env:
            - name: TRILIUM_MULTIFACTORAUTHENTICATION_OAUTHCLIENTID
              valueFrom:
                secretKeyRef:
                  name: trilium-oidc-secret
                  key: clientId
            - name: TRILIUM_MULTIFACTORAUTHENTICATION_OAUTHCLIENTSECRET
              valueFrom:
                secretKeyRef:
                  name: trilium-oidc-secret
                  key: clientSecret
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /api/health-check
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health-check
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /home/node/trilium-data
            - name: tmp
              mountPath: /tmp
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
            requests:
              memory: 256Mi
              cpu: "0.2"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: trilium-pvc
        - name: configmap
          configMap:
            name: trilium-config
        - name: tmp
          emptyDir:
            medium: Memory
