apiVersion: v1
kind: ConfigMap
metadata:
  name: trilium-config
  namespace: trilium
  labels:
    app.kubernetes.io/name: trilium
data:
  config.ini: |
    [General]
    instanceName=
    noAuthentication=false
    noBackup=false

    [Network]
    host=0.0.0.0
    port=8080
    https=false
    certPath=
    keyPath=
    trustedReverseProxy=true

    [MultiFactorAuthentication]
    oauthBaseUrl=https://trilium.kennyandries.com
    oauthClientId=!secret clientId
    oauthClientSecret=!secret clientSecret
    oauthIssuerBaseUrl=https://auth.kennyandries.com
    oauthIssuerName=Pocket ID
    oauthIssuerIcon=https://auth.kennyandries.com/api/application-images/logo
