apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: servarr-sabnzbd
  namespace: servarr
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
  labels:
    app.kubernetes.io/name: sabnzbd
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
