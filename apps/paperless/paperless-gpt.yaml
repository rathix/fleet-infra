apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-gpt
  namespace: flux-system
spec:
  chart:
    spec:
      chart: app-template
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: bjw-s
      version: 5.0.1
  interval: 30m
  timeout: 5m
  # Without releaseName, Flux names the release <targetNamespace>-<name>
  # (paperless-paperless-gpt) and app-template labels every resource that way.
  # Pin it so names/labels are just "paperless-gpt" (matches the NetworkPolicy
  # selector and avoids the double-name).
  releaseName: paperless-gpt
  targetNamespace: paperless
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  # Universal pod security/options come from this shared ConfigMap; inline
  # values below override/extend it (see apps/_shared/app-template-defaults.yaml).
  valuesFrom:
    - kind: ConfigMap
      name: app-template-defaults
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
    controllers:
      main:
        strategy: Recreate
        revisionHistoryLimit: 3
        containers:
          app:
            image:
              repository: icereed/paperless-gpt
              tag: v0.25.1@sha256:c0ce6186028911101a2cfe68353f14a9dbb2653596f3f1cff94de4b6db3114ff
            env:
              # paperless-ngx connection (in-cluster service + public URL for UI links)
              PAPERLESS_BASE_URL: http://paperless:8000
              PAPERLESS_PUBLIC_URL: https://paperless.${domain}
              PAPERLESS_API_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: paperless-gpt-secrets
                    key: PAPERLESS_API_TOKEN
              # Text tasks (title/tags/correspondents) via Ollama on the Windows box
              LLM_PROVIDER: ollama
              LLM_MODEL: qwen2.5:7b
              OLLAMA_HOST: http://192.168.1.254:11434
              LLM_LANGUAGE: English
              # LLM-based OCR via a vision model
              OCR_PROVIDER: llm
              VISION_LLM_PROVIDER: ollama
              VISION_LLM_MODEL: minicpm-v
              OCR_LIMIT_PAGES: "5"
              # Auto-generation features (apply only to tagged documents)
              AUTO_GENERATE_TITLE: "true"
              AUTO_GENERATE_TAGS: "true"
              AUTO_GENERATE_CORRESPONDENTS: "true"
              LOG_LEVEL: info
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: "1"
                memory: 512Mi
    service:
      app:
        controller: main
        ports:
          http:
            port: 8080
    ingress:
      app:
        className: ${ingress_class}
        annotations:
          traefik.ingress.kubernetes.io/router.middlewares: traefik-system-oidc@kubernetescrd
        hosts:
          - host: paperless-gpt.${domain}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
    persistence:
      # paperless-gpt writes config/settings.json under its workdir (/app), which
      # is root-owned in the image. A writable volume (chowned to fsGroup 1000)
      # lets it run as non-root. emptyDir = settings regenerate from defaults on
      # restart; switch to a PVC if UI-tuned prompts need to persist.
      config:
        type: emptyDir
        globalMounts:
          - path: /app/config
