apiVersion: apps/v1
kind: Deployment
metadata:
  name: tika
  namespace: paperless
  labels:
    app.kubernetes.io/name: tika
    app.kubernetes.io/part-of: paperless
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: tika
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tika
        app.kubernetes.io/part-of: paperless
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 35002
        runAsGroup: 35002
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tika
          image: apache/tika:3.3.1.0-full
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 9998
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /tika
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: 256Mi
              cpu: "100m"
            limits:
              memory: 1Gi
              cpu: "1"
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tika
  namespace: paperless
  labels:
    app.kubernetes.io/name: tika
    app.kubernetes.io/part-of: paperless
spec:
  selector:
    app.kubernetes.io/name: tika
  ports:
    - name: http
      port: 9998
      targetPort: http
