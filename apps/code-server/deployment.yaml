apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-server
  namespace: code-server
  labels:
    app.kubernetes.io/name: code-server
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: code-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: code-server
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: code-server
          image: codercom/code-server:4.126.0@sha256:e1f03b5faaefd63ba6c7173a5290c6ec0526ac907f23acfe6bc949dd965279e4
          # Override the image entrypoint (which wraps code-server in fixuid) so it
          # runs cleanly under a non-root/restricted securityContext. Auth is handled
          # at the edge by the Traefik oidc middleware, so code-server uses --auth none.
          command: ["/usr/bin/code-server"]
          args:
            - "--bind-addr"
            - "0.0.0.0:8080"
            - "--auth"
            - "none"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
          env:
            - name: HOME
              value: /home/coder
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /home/coder
          resources:
            requests:
              memory: 256Mi
              cpu: "250m"
            limits:
              memory: 2Gi
              cpu: "2"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: code-server-data
