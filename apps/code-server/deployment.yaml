apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-server
  namespace: code-server
  labels:
    app.kubernetes.io/name: code-server
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: code-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: code-server
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: code-server
          image: codercom/code-server:4.129.0@sha256:49d5e176224523b0c924ee35b05c51e9a87f9c170f650ee0f7da05a4581a79ff
          # Override the image entrypoint (which wraps code-server in fixuid) so it
          # runs cleanly under a non-root/restricted securityContext. Auth is handled
          # at the edge by the Traefik oidc middleware, so code-server uses --auth none.
          command: ["/usr/bin/code-server"]
          args:
            - "--bind-addr"
            - "0.0.0.0:8080"
            - "--auth"
            - "none"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
          env:
            - name: HOME
              value: /home/coder
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            # Tolerate a stalled event loop during CPU-heavy builds (e.g. Gradle)
            # so the kubelet doesn't restart a pod that's merely busy compiling.
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /home/coder
          resources:
            requests:
              memory: 512Mi
              cpu: "250m"
            limits:
              # Android/Gradle builds (Gradle daemon + kotlinc/javac + d8/r8 dexing)
              # routinely exceed 2Gi and get OOMKilled. 6Gi fits a 16Gi node with
              # headroom for the OS/kubelet. Cap Gradle's own heap to stay inside
              # this limit, e.g. in ~/.gradle/gradle.properties:
              #   org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g
              memory: 6Gi
              cpu: "2"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: code-server-data
