apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure
  interval: 10m
  retryInterval: 2m
  timeout: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps
  prune: true
  # wait: false so a single failing/crashlooping HelmRelease can't stall the
  # whole apps reconcile (and block other apps' updates) for the 15m timeout.
  # apps is the terminal stage — nothing dependsOn it — so health-gating the
  # entire tree has no ordering benefit, only the cross-app blocking downside.
  # The uptime-kuma healthCheck below stays as a lightweight canary gate.
  wait: false
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-config
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: uptime-kuma
      namespace: flux-system
